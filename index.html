  let endTime = 0, remaining = 0, raf = null;

  const display   = document.getElementById('pomoDisplay');
  const label     = document.getElementById('pomoLabel');
  const dotsEl    = document.getElementById('pomoDots');
  const startBtn  = document.getElementById('pomoStart');
  const stopBtn   = document.getElementById('pomoStop');
  const resetBtn  = document.getElementById('pomoReset');
  const skipBtn   = document.getElementById('pomoSkip');

  function buildDots() {
    dotsEl.innerHTML = '';
    for (let i = 0; i < SESSIONS_BEFORE_LONG; i++) {
      const d = document.createElement('div');
      d.className = 'pomo-dot' + (i < sessionCount % SESSIONS_BEFORE_LONG ? ' done' : '');
      dotsEl.appendChild(d);
    }
  }

  function fmt(ms) {
    ms = Math.max(0, ms);
    const ts = Math.ceil(ms / 1000);
    return pad(Math.floor(ts / 60)) + ':' + pad(ts % 60);
  }

  function setLabel() {
    label.textContent = isBreak
      ? (sessionCount % SESSIONS_BEFORE_LONG === 0 ? 'Long Break' : 'Short Break')
      : 'Focus';
    display.classList.toggle('break-mode', isBreak);
    label.classList.toggle('break-mode', isBreak);
  }

  function render() {
    const r = running ? endTime - Date.now() : remaining;
    display.textContent = fmt(r);
    if (r <= 0) {
      running = false;
      beepPomo();
      if (!isBreak) {
        sessionCount++;
        buildDots();
        isBreak = true;
        remaining = (sessionCount % SESSIONS_BEFORE_LONG === 0 ? longMin : shortMin) * 60000;
      } else {
        isBreak = false;
        remaining = workMin * 60000;
      }
      setLabel();
      display.textContent = fmt(remaining);
      startBtn.style.display = ''; stopBtn.style.display = 'none';
      return;
    }
    if (running) raf = requestAnimationFrame(render);
  }

  function beepPomo() {
    try {
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      [0, 180, 360].forEach(delay => {
        const o = ctx.createOscillator(), g = ctx.createGain();
        o.connect(g); g.connect(ctx.destination);
        o.frequency.value = isBreak ? 523 : 880;
        g.gain.setValueAtTime(0, ctx.currentTime + delay/1000);
        g.gain.linearRampToValueAtTime(0.18, ctx.currentTime + delay/1000 + 0.05);
        g.gain.linearRampToValueAtTime(0, ctx.currentTime + delay/1000 + 0.35);
        o.start(ctx.currentTime + delay/1000);
        o.stop(ctx.currentTime + delay/1000 + 0.4);
      });
    } catch(e) {}
  }

  startBtn.addEventListener('click', () => {
    if (running) return;
    if (remaining <= 0) remaining = workMin * 60000;
    running = true;
    endTime = Date.now() + remaining;
    startBtn.style.display = 'none'; stopBtn.style.display = '';
    raf = requestAnimationFrame(render);
  });
  stopBtn.addEventListener('click', () => {
    if (!running) return;
    remaining = endTime - Date.now(); running = false;
    cancelAnimationFrame(raf);
    stopBtn.style.display = 'none'; startBtn.style.display = '';
  });
  resetBtn.addEventListener('click', () => {
    running = false; isBreak = false; sessionCount = 0;
    cancelAnimationFrame(raf);
    remaining = workMin * 60000;
    display.textContent = fmt(remaining);
    startBtn.style.display = ''; stopBtn.style.display = 'none';
    setLabel(); buildDots();
  });
  skipBtn.addEventListener('click', () => {
    running = false; cancelAnimationFrame(raf);
    if (!isBreak) { sessionCount++; buildDots(); }
    isBreak = !isBreak;
    remaining = isBreak
      ? (sessionCount % SESSIONS_BEFORE_LONG === 0 ? longMin : shortMin) * 60000
      : workMin * 60000;
    setLabel();
    display.textContent = fmt(remaining);
    startBtn.style.display = ''; stopBtn.style.display = 'none';
  });

  // Preset buttons
  document.querySelectorAll('.pomo-preset').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      running = false; cancelAnimationFrame(raf);
      document.querySelectorAll('.pomo-preset').forEach(b => b.classList.remove('active-preset'));
      btn.classList.add('active-preset');
      workMin  = parseInt(btn.dataset.work);
      shortMin = parseInt(btn.dataset.short);
      longMin  = parseInt(btn.dataset.long);
      isBreak = false; sessionCount = 0;
      remaining = workMin * 60000;
      display.textContent = fmt(remaining);
      startBtn.style.display = ''; stopBtn.style.display = 'none';
      setLabel(); buildDots();
    });
  });

  buildDots();
  display.textContent = fmt(workMin * 60000);
})();

// ══════════════════════════════════════════════
// ── ALARM ──
// ══════════════════════════════════════════════
(function() {
  let alarms = []; // {id, time:'HH:MM', note, on, firedToday}
  let nextId = 1;

  const listEl    = document.getElementById('alarmList');
  const timeInp   = document.getElementById('alarmTimeInput');
  const noteInp   = document.getElementById('alarmNoteInput');
  const addBtn    = document.getElementById('alarmAddBtn');
  const ringEl    = document.getElementById('alarmRing');
  const ringTime  = document.getElementById('alarmRingTime');
  const ringNote  = document.getElementById('alarmRingNote');
  const dismissBtn= document.getElementById('alarmDismissBtn');

  let ringCtx = null, ringInterval = null;

  function startRinging(alarm) {
    ringTime.textContent = alarm.time;
    ringNote.textContent = alarm.note || '';
    ringEl.classList.add('visible');
    try {
      ringCtx = new (window.AudioContext || window.webkitAudioContext)();
      (function beep() {
        if (!ringEl.classList.contains('visible')) return;
        const o = ringCtx.createOscillator(), g = ringCtx.createGain();
        o.connect(g); g.connect(ringCtx.destination);
        o.frequency.value = 880;
        g.gain.setValueAtTime(0, ringCtx.currentTime);
        g.gain.linearRampToValueAtTime(0.22, ringCtx.currentTime + 0.06);
        g.gain.linearRampToValueAtTime(0, ringCtx.currentTime + 0.35);
        o.start(ringCtx.currentTime); o.stop(ringCtx.currentTime + 0.4);
        setTimeout(beep, 900);
      })();
    } catch(e) {}
  }

  dismissBtn.addEventListener('click', () => {
    ringEl.classList.remove('visible');
    if (ringCtx) { try { ringCtx.close(); } catch(e){} ringCtx = null; }
  });

  function renderAlarms() {
    listEl.innerHTML = '';
    if (!alarms.length) {
      const empty = document.createElement('div');
      empty.style.cssText = 'color:#2a3060;font-size:0.82rem;text-align:center;padding:0.6rem;letter-spacing:0.1em;';
      empty.textContent = 'No alarms set';
      listEl.appendChild(empty);
      return;
    }
    alarms.forEach(a => {
      const row = document.createElement('div');
      row.className = 'alarm-row' + (a.on ? ' alarm-active' : '');
      row.innerHTML = `
        <span>
          <span class="alarm-time-lbl">${a.time}</span>
          ${a.note ? `<span class="alarm-note-lbl">${a.note}</span>` : ''}
        </span>
        <span style="display:flex;gap:0.4rem;align-items:center">
          <button class="alarm-toggle ${a.on ? 'on' : ''}">${a.on ? 'ON' : 'OFF'}</button>
          <button class="alarm-del">✕</button>
        </span>`;
      row.querySelector('.alarm-toggle').addEventListener('click', e => {
        e.stopPropagation(); a.on = !a.on; a.firedToday = false; renderAlarms();
      });
      row.querySelector('.alarm-del').addEventListener('click', e => {
        e.stopPropagation(); alarms = alarms.filter(x => x.id !== a.id); renderAlarms();
      });
      listEl.appendChild(row);
    });
  }

  addBtn.addEventListener('click', e => {
    e.stopPropagation();
    const t = timeInp.value;
    if (!t) return;
    alarms.push({ id: nextId++, time: t, note: noteInp.value.trim(), on: true, firedToday: false });
    alarms.sort((a,b) => a.time.localeCompare(b.time));
    noteInp.value = ''; timeInp.value = '';
    renderAlarms();
  });

  // Check alarms every 10 seconds
  setInterval(() => {
    const now = new Date();
    const hh = pad(now.getHours()), mm = pad(now.getMinutes());
    const cur = `${hh}:${mm}`;
    alarms.forEach(a => {
      if (a.on && a.time === cur && !a.firedToday) {
        a.firedToday = true;
        startRinging(a);
      }
      // reset firedToday when minute changes away
      if (a.firedToday && a.time !== cur) a.firedToday = false;
    });
  }, 10000);

  // Set default time to next round hour
  const d = new Date(); d.setHours(d.getHours() + 1, 0, 0, 0);
  timeInp.value = pad(d.getHours()) + ':' + pad(d.getMinutes());

  renderAlarms();
})();

// ══════════════════════════════════════════════
// ── FOCUS MODE ──
// ══════════════════════════════════════════════
(function() {
  const veil    = document.getElementById('focusVeil');
  const btn     = document.getElementById('focusToggleBtn');
  const toolRow = document.getElementById('toolRow');
  const tzPicker= document.querySelector('.tz-picker');
  const wPicker = document.querySelector('.weather-picker');
  let active = false;

  btn.addEventListener('click', e => {
    e.stopPropagation();
    active = !active;
    veil.classList.toggle('active', active);
    btn.classList.toggle('focus-btn-active', active);
    btn.textContent = active ? '☀ Focus' : '🌙 Focus';
    // hide/show all other controls while keeping clock on top (z-index 4, veil is 5)
    [toolRow, tzPicker, wPicker].forEach(el => {
      if (el) el.style.opacity = active ? '0' : '';
      if (el) el.style.pointerEvents = active ? 'none' : '';
    });
  });

  // Click the veil (anywhere) to exit focus mode
  veil.style.pointerEvents = 'none'; // normally passthrough, but we watch clicks on doc
  document.addEventListener('click', e => {
    if (!active) return;
    if (!e.target.closest('#focusToggleBtn')) {
      active = false;
      veil.classList.remove('active');
      btn.classList.remove('focus-btn-active');
      btn.textContent = '🌙 Focus';
      [toolRow, tzPicker, wPicker].forEach(el => {
        if (el) { el.style.opacity = ''; el.style.pointerEvents = ''; }
      });
    }
  });
})();

(function() {
  // Default pinned cities
  let pinned = [
    {tz:'America/New_York',     label:'New York'},
    {tz:'Europe/London',        label:'London'},
    {tz:'Asia/Tokyo',           label:'Tokyo'},
    {tz:'Asia/Taipei',          label:'Taipei'},
  ];

  const listEl  =document.getElementById('wcList');
  const selectEl=document.getElementById('wcSelect');
  const addBtn  =document.getElementById('wcAddBtn');

  // Populate dropdown from TZ_LIST (defined earlier in script)
  function buildSelect(){
    selectEl.innerHTML='';
    TZ_LIST.forEach(item=>{
      if(pinned.some(p=>p.tz===item.tz)) return; // hide already pinned
      const opt=document.createElement('option');
      opt.value=item.tz; opt.textContent=item.label;
      selectEl.appendChild(opt);
    });
  }

  function renderList(){
    listEl.innerHTML='';
    pinned.forEach((p,i)=>{
      const t=getTimeInTZ(p.tz);
      const h12=t.h%12||12;
      const ampm=t.h<12?'AM':'PM';
      const timeStr=`${pad(h12)}:${pad(t.m)}:${pad(t.s)} ${ampm}`;
      const row=document.createElement('div'); row.className='wc-row';
      row.innerHTML=`<span class="wc-city">${p.label}</span><span><span class="wc-time">${timeStr}</span><span class="wc-offset">${t.offsetStr}</span></span><button class="wc-del" data-i="${i}" title="Remove">✕</button>`;
      listEl.appendChild(row);
    });
    listEl.querySelectorAll('.wc-del').forEach(btn=>{
      btn.addEventListener('click',e=>{
        e.stopPropagation();
        pinned.splice(parseInt(btn.dataset.i),1);
        buildSelect(); renderList();
      });
    });
  }

  addBtn.addEventListener('click',()=>{
    const tz=selectEl.value; if(!tz)return;
    const item=TZ_LIST.find(t=>t.tz===tz);
    if(item&&!pinned.some(p=>p.tz===tz)){ pinned.push({tz:item.tz,label:item.label}); buildSelect(); renderList(); }
  });

  buildSelect(); renderList();
  // refresh world clock times every second
  setInterval(()=>{ if(document.getElementById('wcPanel').classList.contains('open')) renderList(); }, 1000);
})();
</script>
